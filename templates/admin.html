{% extends "base.html" %}
{% block title %}Admin Panel{% endblock %}

{% block content %}
<div class="admin-container">
    <header class="app-header">
        <div class="app-header-left">
            <button class="hamburger" id="admin-sidebar-toggle" aria-label="Mở danh mục">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <img src="{{ url_for('static', filename='images/logo_2.png') }}" alt="Logo" class="app-header-logo">
            <div class="app-header-divider"></div>
            <span class="app-header-title">Admin Panel</span>
        </div>
        <div class="app-header-right">
            <span class="app-header-user">{{ current_user.username }}</span>
            <a href="{{ url_for('admin.change_password') }}" class="btn btn-sm">Đổi mật khẩu</a>
            <form method="POST" action="{{ url_for('admin.logout') }}" style="display:inline">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-sm">Đăng xuất</button>
            </form>
        </div>
    </header>

    <div class="admin-layout">
        <div class="sidebar-overlay" id="admin-sidebar-overlay"></div>
        <aside class="sidebar" id="admin-sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Danh mục</span>
                <button class="btn btn-sm btn-primary" id="btn-add-category">+ Thêm</button>
            </div>
            <div class="sidebar-items" id="admin-category-list"></div>
        </aside>

        <main class="admin-main" id="admin-main">
            <div id="admin-content">
                <p class="empty-state">
                    <span class="empty-state-icon">📂</span>
                    Chọn danh mục để quản lý
                </p>
            </div>
        </main>
    </div>
</div>

<!-- Modal: Add/Edit Category -->
<div class="modal-overlay" id="category-modal" style="display:none">
    <div class="modal">
        <h2 id="category-modal-title">Thêm danh mục</h2>
        <form id="category-form">
            <div class="form-group">
                <label for="cat-parent-id">Danh mục cha <span class="required">*</span></label>
                <select id="cat-parent-id">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div class="form-group">
                <label for="cat-name">Tên danh mục <span class="required">*</span></label>
                <input type="text" id="cat-name" placeholder="VD: Lãi suất tiết kiệm" required>
            </div>
            <div id="cat-file-section">
                <div class="form-group">
                    <label for="cat-file">File PDF <span class="optional">(tùy chọn)</span></label>
                    <input type="file" id="cat-file" accept=".pdf">
                </div>
                <div class="form-group" id="cat-pdf-title-group" style="display:none">
                    <label for="cat-pdf-title">Tên hiển thị PDF</label>
                    <input type="text" id="cat-pdf-title" placeholder="VD: Lãi suất tháng 03/2026">
                </div>
            </div>
            <input type="hidden" id="cat-id">
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-category">Hủy</button>
                <button type="submit" class="btn btn-primary">Lưu</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal: Upload PDF -->
<div class="modal-overlay" id="upload-modal" style="display:none">
    <div class="modal">
        <h2>Upload PDF</h2>
        <form id="upload-form">
            <div class="form-group">
                <label for="pdf-title">Tên hiển thị</label>
                <input type="text" id="pdf-title" placeholder="VD: Lãi suất tháng 03/2026" required>
            </div>
            <div class="form-group">
                <label for="pdf-file">Chọn file PDF</label>
                <input type="file" id="pdf-file" accept=".pdf" required>
            </div>
            <input type="hidden" id="upload-category-id">
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" id="btn-cancel-upload">Hủy</button>
                <button type="submit" class="btn btn-primary">Upload</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<meta name="csrf-token" content="{{ csrf_token() }}">
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
