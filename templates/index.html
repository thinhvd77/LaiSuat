{% extends "base.html" %}
{% block title %}Tra cứu lãi suất{% endblock %}

{% block content %}
<div class="public-container">
    <header class="app-header">
        <div class="app-header-left">
            <button class="hamburger" id="sidebar-toggle" aria-label="Mở danh mục">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <img src="{{ url_for('static', filename='images/logo_2.png') }}" alt="Logo" class="app-header-logo">
            <!-- <div class="app-header-divider"></div> -->
            <!-- <span class="app-header-title">Tra cứu lãi suất</span> -->
        </div>
    </header>

    <div class="public-layout">
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="sidebar-title">Danh mục</span>
            </div>
            <div class="sidebar-items" id="category-list">
                <div class="loading"></div>
            </div>
        </aside>

        <main class="viewer">
            <div class="viewer-toolbar" id="viewer-toolbar" style="display:none;">
                <span id="category-name" class="viewer-category-name"></span>
                <select id="pdf-select" class="pdf-select"></select>
            </div>
            <div id="pdf-viewer" class="pdf-viewer">
                <p class="empty-state" id="viewer-empty">
                    <span class="empty-state-icon">📊</span>
                    Chọn danh mục để xem lãi suất
                </p>
            </div>
            <button class="scroll-top-btn" id="scroll-top-btn" aria-label="Về đầu trang">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="18 15 12 9 6 15"></polyline>
                </svg>
            </button>
        </main>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='pdfjs/pdf.min.mjs') }}" type="module"></script>
<script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
{% endblock %}
