{% extends "base.html" %}
{% block title %}Đăng nhập — Admin{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-brand">
        <img src="{{ url_for('static', filename='images/logo_2.png') }}" alt="Logo" class="login-brand-logo">
        <div class="login-brand-text">Hệ thống quản lý lãi suất ngân hàng</div>
        <div class="login-brand-sub">Dành cho nhân viên nội bộ</div>
    </div>

    <div class="login-form-side">
        <div class="login-card">
            <img src="{{ url_for('static', filename='images/Logo.png') }}" alt="Logo" class="login-card-logo-mobile">
            <h1>Đăng nhập</h1>
            <p class="login-subtitle">Quản lý lãi suất ngân hàng</p>

            <form method="POST" action="{{ url_for('admin.login') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Đăng nhập</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
